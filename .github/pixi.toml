[workspace]
channels = ["conda-forge"]
platforms = ["linux-64", "osx-64", "win-64"]

[dependencies]
python = ">=3.11.15,<3.15"
pytest = ">=9.0.3,<10"
# these should match the root pixi.toml
geojson = ">=3.2.0,<4"
geopandas = ">=1.1.3,<2"
matplotlib = ">=3.10.9,<4"
pyarrow = ">=24.0.0,<25"
xmltodict = ">=1.0.4,<2"

[tasks]
test = "pytest ../tests"

[pypi-dependencies]
footbridge = { path = "..", editable = false }

[environments]
py311 = { features = ["py311"] }
py312 = { features = ["py312"] }
py313 = { features = ["py313"] }
py314 = { features = ["py314"] }

[feature.py311.dependencies]
python = "3.11.*"

[feature.py312.dependencies]
python = "3.12.*"

[feature.py313.dependencies]
python = "3.13.*"

[feature.py314.dependencies]
python = "3.14.*"
