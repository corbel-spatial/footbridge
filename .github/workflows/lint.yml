name: Lint Check

on:
  workflow_dispatch:
  pull_request:
    paths: [ "src/**", "tests/**" ]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      # https://github.com/actions/checkout
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            pixi.lock
            pixi.toml
            pyproject.toml
            README.md
            src
            tests
          sparse-checkout-cone-mode: false

      # https://github.com/marketplace/actions/setup-pixi
      - uses: prefix-dev/setup-pixi@v0.9.4
        with:
          pixi-version: v0.67.2
          cache: true
          environments: dev
          activate-environment: true
          locked: false
          frozen: true
      - name: lint
        run: pixi run lint
