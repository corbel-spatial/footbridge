[workspace]
channels = ["conda-forge"]
platforms = ["linux-64", "linux-aarch64", "osx-arm64", "osx-64", "win-64"]

[dependencies]
python = ">=3.14.4,<3.15"
geojson = ">=3.2.0,<4"
geopandas = ">=1.1.3,<2"
matplotlib = ">=3.10.9,<4"
pyarrow = ">=24.0.0,<25"
xmltodict = ">=1.0.4,<2"

[pypi-dependencies]
footbridge = { path = ".", editable=true }

[environments]
default = ["default"]
dev = ["dev", "docs", "lint"]
docs = ["docs"]
lint = ["lint"]
test = ["test"]

[feature.dev.dependencies]
pandas-stubs = ">=3.0.0.260204,<4"
pixi-pycharm = ">=0.0.11,<0.0.12"
ruff = ">=0.15.11,<0.16"

[feature.docs]
# dependencies should match docs/requirements.txt
dependencies = { jupyter = ">=1.1.1,<2", myst-parser = ">=5.0.0,<6", nbsphinx = ">=0.9.8,<0.10", notebook = ">=7.5.5,<8", pydata-sphinx-theme = ">=0.17.1,<0.18", sphinx = ">=9.1.0,<10", sphinx-copybutton = ">=0.5.2,<0.6" }
tasks = { docs = "./docs/make html" }
target = { win-64 = { tasks = { docs = ".\\docs\\make.bat html && .\\docs\\make.bat html && cmd /k start %cd%\\docs\\_build\\html\\index.html"} } }

[feature.lint]
dependencies = { ruff = ">=0.15.11,<0.16" }
tasks = { lint = "ruff check ./src ./tests", lint-format = "ruff format ./src ./tests"}

[feature.test.dependencies]
pytest = ">=9.0.3,<10"
pytest-cov = ">=7.1.0,<8"
pytest-xdist = ">=3.8.0,<4"

[feature.test.tasks]
# TODO coverage = "slipcover --source src --json --pretty-print --out ./docs/pytest_coverage.json -m pytest"
test = { cmd = "pytest tests", default-environment = "test"}
