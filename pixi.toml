[workspace]
channels = ["conda-forge"]
platforms = ["linux-64", "linux-aarch64", "osx-arm64", "osx-64", "win-64"]
preview = ["pixi-build"]

[package.build.backend]
name = "pixi-build-python"
version = "*"

[package.host-dependencies]
hatchling = "*"

[dependencies]
python = ">=3.14.4,<4"
geojson = ">=3.2.0,<4"
geopandas = ">=1.1.3,<2"
gdal = ">=3.12.4,<4"
matplotlib = ">=3.10.9,<4"
pyarrow = ">=24.0.0,<25"
xmltodict = ">=1.0.4,<2"

[pypi-dependencies]
footbridge = { path = ".", editable = true }

[environments]
default = { features = ["default"], solve-group = "default" }
dev = { features = ["dev", "docs"], solve-group = "default" }
docs = { features = ["docs"], solve-group = "docs" }

[feature.dev.dependencies]
duckdb = ">=1.5.2,<2"
pandas-stubs = ">=3.0.0.260204,<4"
pixi-pycharm = ">=0.0.11,<1"
pytest = ">=9.0.3,<10"
pytest-cov = ">=7.1.0,<8"
pytest-xdist = ">=3.8.0,<4"
ruff = ">=0.15.11,<1"
sedonadb = ">=0.3.0,<0.4"
types-shapely = ">=2.1.0.20260402,<3"

[feature.dev.tasks]
coverage = "pytest -n auto --cov=footbridge --cov-report=json:docs/pytest_coverage.json --cov-report=term-missing"
lint = "ruff check ./src ./tests"
lint-fmt = "ruff check --fix ./src ./tests && ruff format ./src ./tests"
test = "pytest -n auto ./tests"

[feature.docs]
# dependencies should match docs/requirements.txt
dependencies = { jupyter = ">=1.1.1,<2", myst-parser = ">=5.0.0,<6", nbsphinx = ">=0.9.8,<1", notebook = ">=7.5.6,<8", pydata-sphinx-theme = ">=0.17.1,<1", sphinx = ">=9.1.0,<10", sphinx-copybutton = ">=0.5.2,<1" }
tasks = { docs = "./docs/make html" }
target = { win-64 = { tasks = { docs = "./docs/make.bat html" } } }
